<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>資安宣導 — 互動小測驗</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    margin: 0; padding: 24px 16px;
    background: #1a1a2e; color: #f0f0f0; min-height: 100vh;
  }
  .container { max-width: 860px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 32px; }
  header h1 { font-size: 2rem; margin: 0 0 6px; color: #fff; }
  header p { margin: 0; color: #aaa; font-size: 0.95rem; }

  .card {
    background: #16213e; border-radius: 12px;
    padding: 24px 28px; margin-bottom: 20px;
    border: 1px solid #2a2a4a;
    transition: border-color 0.2s;
  }
  .card.correct  { border-color: #4ecdc4; }
  .card.wrong    { border-color: #ff6b6b; }

  .q-label { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em;
             color: #ff6b6b; margin-bottom: 8px; }
  .q-text  { font-size: 1.05rem; font-weight: 600; margin: 0 0 16px; line-height: 1.5; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .options button {
    background: #0f3460; border: 1px solid #2a4a7f; color: #e0e0e0;
    border-radius: 8px; padding: 10px 14px; cursor: pointer;
    text-align: left; font-size: 0.95rem; font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
  }
  .options button:hover:not(:disabled) { background: #1a4a80; border-color: #4a7abf; }
  .options button.selected  { background: #1a3a6e; border-color: #2d8cff; color: #fff; }
  .options button.correct-ans { background: #0d3d38; border-color: #4ecdc4; color: #4ecdc4; }
  .options button.wrong-ans   { background: #3d1a1a; border-color: #ff6b6b; color: #ff6b6b; }
  .options button:disabled { cursor: default; }

  .feedback { margin-top: 12px; font-size: 0.9rem; padding: 10px 14px;
              border-radius: 6px; display: none; }
  .feedback.show { display: block; }
  .feedback.ok  { background: #0d3d38; color: #4ecdc4; }
  .feedback.bad { background: #3d1a1a; color: #ff9090; }

  .submit-row { text-align: center; margin: 28px 0 16px; }
  .submit-row button {
    background: #e94560; border: none; color: #fff;
    padding: 14px 40px; border-radius: 8px; font-size: 1rem;
    font-family: inherit; font-weight: 700; cursor: pointer;
    transition: background 0.15s;
  }
  .submit-row button:hover { background: #c73450; }
  .submit-row button:disabled { background: #555; cursor: default; }

  #scoreboard {
    background: #16213e; border: 1px solid #2a2a4a; border-radius: 12px;
    padding: 28px; text-align: center; display: none; margin-bottom: 20px;
  }
  #scoreboard h2 { margin: 0 0 8px; font-size: 2.2rem; }
  #scoreboard .grade { font-size: 3.5rem; font-weight: 800; margin: 8px 0; }
  #scoreboard .grade.pass { color: #4ecdc4; }
  #scoreboard .grade.fail { color: #ff6b6b; }
  #scoreboard p { color: #aaa; margin: 0; }

  .retry-btn {
    background: transparent; border: 1px solid #4ecdc4; color: #4ecdc4;
    padding: 10px 28px; border-radius: 8px; font-size: 0.95rem;
    font-family: inherit; cursor: pointer; margin-top: 16px;
    transition: background 0.15s;
  }
  .retry-btn:hover { background: #0d3d38; }

  footer { text-align: center; color: #555; font-size: 0.8rem; margin-top: 24px; }

  @media print {
    body { background: #fff; color: #000; }
    .options button { border: 1px solid #999; color: #000; background: #fff; }
    .submit-row, .retry-btn { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🛡️ 資安宣導 — 小測驗</h1>
    <p>共 5 題單選題，完成後按「交卷」查看成績與解析。</p>
  </header>

  <div id="scoreboard">
    <h2>測驗完成！</h2>
    <div class="grade" id="gradeText"></div>
    <p id="gradeMsg"></p>
    <br>
    <button class="retry-btn" onclick="resetQuiz()">🔄 重新作答</button>
    &nbsp;
  </div>

  <div id="quiz"></div>

  <div class="submit-row">
    <button id="submitBtn">交卷並顯示成績</button>
  </div>
</div>
<footer>由內部資安團隊提供教材 — 2025</footer>

<script>
const questions = [
  {
    q: "你在公司電腦發現一個「需要安裝更新」的彈窗，來源不明，你應該？",
    opts: ["立刻點「更新」", "忽略它", "通知 IT 部門確認"],
    ans: 2,
    explain: "來源不明的彈窗可能是惡意程式偽裝，應先聯繫 IT 確認，切勿直接點擊安裝。"
  },
  {
    q: "你插入一支陌生 USB 後，電腦自動彈出「正在執行 setup.exe」，你應該？",
    opts: ["直接關閉並拔除 USB，通知 IT", "看起來沒事就放著", "嘗試重開機解決"],
    ans: 0,
    explain: "陌生 USB 自動執行程式是勒索軟體或惡意程式的常見入侵途徑，應立即拔除並通報 IT。"
  },
  {
    q: "公司筆電發燙異常、風扇暴轉、出現奇怪網路連線時應該？",
    opts: ["自己掃毒看看", "拍照記錄後立刻通報 IT", "等下次重開機再說"],
    ans: 1,
    explain: "這些症狀可能是惡意程式持續運作的跡象。拍照留存後立即通報 IT，不要拖延或自行處理。"
  },
  {
    q: "哪一個是正確的資安觀念？",
    opts: ["為了方便可以共用帳號", "下載破解軟體只要不在公司用就沒差", "密碼不外借、不重複、定期更換"],
    ans: 2,
    explain: "共用帳號無法追蹤責任歸屬；破解軟體常內含木馬；密碼安全三原則是資安最基本的要求。"
  },
  {
    q: "如果發現同事安裝了未經授權的軟體，正確作法是？",
    opts: ["假裝沒看到", "匿名向主管或 IT 通報", "幫他用看看功能"],
    ans: 1,
    explain: "未經授權的軟體可能帶來安全風險或授權問題。通報是保護公司也保護同事的正確行動，匿名管道可降低顧慮。"
  }
];

function renderQuiz() {
  const container = document.getElementById('quiz');
  container.innerHTML = '';
  questions.forEach((qq, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + idx;

    const label = document.createElement('div');
    label.className = 'q-label';
    label.textContent = '第 ' + (idx + 1) + ' 題 / ' + questions.length;
    card.appendChild(label);

    const qText = document.createElement('p');
    qText.className = 'q-text';
    qText.textContent = qq.q;
    card.appendChild(qText);

    const opts = document.createElement('div');
    opts.className = 'options';
    opts.id = 'opts-' + idx;
    qq.opts.forEach((o, i) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.innerHTML = '<strong>' + String.fromCharCode(65 + i) + '.</strong>　' + o;
      btn.dataset.idx = i;
      btn.onclick = function () {
        if (btn.disabled) return;
        Array.from(opts.children).forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      };
      opts.appendChild(btn);
    });
    card.appendChild(opts);

    const fb = document.createElement('div');
    fb.className = 'feedback';
    fb.id = 'fb-' + idx;
    card.appendChild(fb);

    container.appendChild(card);
  });
}

document.getElementById('submitBtn').addEventListener('click', function () {
  let score = 0;
  let unanswered = [];

  questions.forEach((qq, idx) => {
    const opts = document.getElementById('opts-' + idx);
    const sel = opts.querySelector('.selected');
    const fb = document.getElementById('fb-' + idx);
    const card = document.getElementById('card-' + idx);

    if (!sel) { unanswered.push(idx + 1); return; }

    const chosen = parseInt(sel.dataset.idx);
    Array.from(opts.children).forEach(b => { b.disabled = true; });

    if (chosen === qq.ans) {
      score++;
      sel.classList.add('correct-ans');
      card.classList.add('correct');
      fb.className = 'feedback ok show';
      fb.innerHTML = '✅ 正確！' + qq.explain;
    } else {
      sel.classList.add('wrong-ans');
      opts.children[qq.ans].classList.add('correct-ans');
      card.classList.add('wrong');
      fb.className = 'feedback bad show';
      fb.innerHTML = '❌ 錯誤。正確答案是 <strong>' + String.fromCharCode(65 + qq.ans) + '. ' + qq.opts[qq.ans] + '</strong>。' + qq.explain;
    }
  });

  if (unanswered.length > 0) {
    alert('第 ' + unanswered.join('、') + ' 題尚未作答，請完成所有題目後再交卷。');
    return;
  }

  document.getElementById('submitBtn').disabled = true;

  const board = document.getElementById('scoreboard');
  board.style.display = 'block';
  const pct = Math.round(score / questions.length * 100);
  const gradeEl = document.getElementById('gradeText');
  const msgEl = document.getElementById('gradeMsg');
  gradeEl.textContent = score + ' / ' + questions.length + '　（' + pct + '%）';
  if (pct >= 80) {
    gradeEl.className = 'grade pass';
    msgEl.textContent = '🎉 恭喜通過！你對公司資安規範已有良好掌握。';
  } else {
    gradeEl.className = 'grade fail';
    msgEl.textContent = '📖 建議重新閱讀課程內容，加強相關觀念後再次作答。';
  }
  board.scrollIntoView({ behavior: 'smooth' });
});

function resetQuiz() {
  document.getElementById('scoreboard').style.display = 'none';
  document.getElementById('submitBtn').disabled = false;
  renderQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderQuiz();
</script>
</body>
</html>
